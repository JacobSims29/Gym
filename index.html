<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<meta name="theme-color" content="#0a0a0a">
<title>Gym Log</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a0a; --card:#171717; --line:#262626; --line2:#404040;
    --text:#f5f5f5; --dim:#a3a3a3; --dimmer:#525252;
    --accent:#fbbf24; --good:#34d399; --bad:#f87171; --cardio:#60a5fa;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:calc(120px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;padding:16px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}

  .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
  h2{font-size:24px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
  .sub{font-size:13px;color:var(--dimmer);margin-top:4px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:8px}
  .grow{flex:1}

  input{
    background:var(--bg);border:1px solid var(--line2);border-radius:6px;
    color:var(--text);padding:12px;font-size:16px;font-family:inherit;width:100%;
  }
  input:focus{outline:none;border-color:var(--accent)}
  input.num{font-family:ui-monospace,Menlo,monospace;text-align:center;font-variant-numeric:tabular-nums}
  input.sr{width:52px;padding:12px 4px;color:var(--dim);border-color:var(--line)}

  button{font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:8px;
    padding:14px;cursor:pointer;background:var(--card);color:var(--text);width:100%}
  .primary{background:var(--accent);color:#0a0a0a}
  .ghost{background:#262626;color:var(--text)}
  .saved{background:#059669;color:#fff}
  .icon{width:auto;padding:8px;background:none;color:var(--dimmer);font-size:16px}

  .seg{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:12px}
  .seg button{border:1px solid var(--line);background:var(--card);color:var(--dimmer);padding:12px 4px;font-size:14px}
  .seg button.on{border-color:var(--accent);background:#262626;color:var(--text)}
  .seg button.on.cardio{border-color:var(--cardio)}

  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(6,1fr);padding-bottom:env(safe-area-inset-bottom);z-index:30}
  .nav button{background:none;border-radius:0;font-size:10px;font-weight:600;color:var(--dimmer);
    padding:14px 0;border-top:2px solid transparent}
  .nav button.on{color:var(--accent);border-top-color:var(--accent)}

  /* diet */
  .subseg{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:14px}
  .subseg button{border:1px solid var(--line);background:var(--card);color:var(--dimmer);padding:10px 4px;font-size:13px}
  .subseg button.on{border-color:var(--accent);background:#262626;color:var(--text)}
  .toggle{display:inline-grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:3px;margin-bottom:14px}
  .toggle button{padding:8px 18px;font-size:13px;border-radius:6px;color:var(--dimmer);background:none}
  .toggle button.on{background:#262626;color:var(--accent)}
  .kcal{font-size:40px;font-weight:700;letter-spacing:-.02em}
  .kcal span{font-size:15px;font-weight:500;color:var(--dimmer)}
  .bar{height:10px;border-radius:5px;background:var(--bg);overflow:hidden;margin:10px 0;position:relative}
  .bar>div{height:100%;border-radius:5px}
  .macro{margin-top:12px}
  .macro .top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
  .macro .val{font-size:13px}
  .mbar{height:6px;border-radius:3px;background:var(--bg);overflow:hidden;position:relative}
  .mbar>div{height:100%}
  .tick{position:absolute;top:0;bottom:0;width:2px;background:rgba(245,245,245,.6);border-radius:1px}
  .meal{background:var(--card);border:1px solid var(--line);border-radius:10px;margin-bottom:12px;overflow:hidden}
  .meal .mh{display:flex;align-items:center;justify-content:space-between;padding:14px 16px}
  .meal .mh h3{font-size:17px;font-weight:600}
  .mtoggle{cursor:pointer;user-select:none;display:flex;align-items:center;flex:1}
  .copyrow{padding:12px 16px;border-top:1px solid var(--line)}
  .pill{font-size:12px;font-family:ui-monospace,Menlo,monospace;background:#1e293b;color:#93c5fd;padding:3px 8px;border-radius:10px;margin-left:6px}
  .pill.p{background:#2e1065;color:#c4b5fd}
  .fitem{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-top:1px solid var(--line)}
  .fitem .fn{font-size:15px}
  .fitem .fq{font-size:12px;color:var(--dimmer);margin-top:2px}
  .fitem .fm{text-align:right;font-size:13px}
  .plus{width:auto;padding:6px 10px;background:none;color:var(--accent);font-size:20px}
  .addbox{padding:0 16px 14px}
  .pickrow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--line)}
  .pickrow button.padd{width:auto;padding:6px 12px;background:#262626;color:var(--text);font-size:13px}
  .qty{display:flex;gap:6px;align-items:center;margin-top:6px}
  .qty input{width:70px;padding:8px;text-align:center}
  .qty select{width:auto;padding:8px;background:var(--bg);border:1px solid var(--line2);border-radius:6px;color:var(--text);font-size:14px}
  .foodcard{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px;margin-bottom:10px}
  .foodcard .macros{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
  .foodcard .macros label{font-size:10px;color:var(--dimmer);display:block;text-align:center;margin-bottom:2px}
  .foodcard .macros input{padding:8px 4px;text-align:center;font-size:14px}

  .lift{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .lift h3{font-size:16px;font-weight:600}
  .exname{font-size:16px;font-weight:600;background:var(--bg);border:1px solid var(--line);border-radius:6px;
    color:var(--text);padding:8px 10px;width:100%}
  .exname:focus{outline:none;border-color:var(--accent)}
  .planrow{padding:12px 0;border-bottom:1px solid var(--line)}
  .planrow:last-child{border-bottom:none}
  .down{color:var(--bad)}
  button.icon:disabled{opacity:.25}
  .last{font-size:11px;color:var(--dimmer);font-family:ui-monospace,Menlo,monospace}
  .up{color:var(--good)}

  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .hdr .mid{text-align:center;cursor:pointer}
  .arrow{background:none;color:var(--dimmer);font-size:22px;width:44px;padding:8px}
  .caret{font-size:11px;color:var(--dimmer);margin-top:2px}

  /* calendar */
  .cal{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:12px}
  .calhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .calhdr span{font-size:14px;font-weight:600}
  .calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
  .cd{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:6px;font-size:13px;color:var(--dim);background:none;padding:0;font-weight:500}
  .cd.dow{color:var(--dimmer);font-size:10px;font-weight:600;text-transform:uppercase;aspect-ratio:auto;padding:4px 0}
  .cd.blank{visibility:hidden}
  .cd.today{border:1px solid var(--line2)}
  .cd.sel{background:var(--accent);color:#0a0a0a;font-weight:700}
  .dots{display:flex;gap:2px;height:4px;margin-top:2px}
  .dot{width:4px;height:4px;border-radius:50%;background:var(--accent)}
  .dot.c{background:var(--cardio)}
  .cd.sel .dot{background:#0a0a0a}

  .list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;
    border-bottom:1px solid var(--line)}
  .list-row:last-child{border-bottom:none}
  .tap{flex:1;text-align:left;background:none;padding:0;font-weight:400;font-size:14px;color:var(--dim)}

  .empty{border:1px dashed var(--line2);border-radius:10px;padding:32px 16px;text-align:center;color:var(--dimmer);font-size:14px}
  .warn{background:#422006;border:1px solid #78350f;color:#fcd34d;padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .ok{color:var(--good);font-size:13px;margin-top:8px}
  .err{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .photo{position:relative;aspect-ratio:1;background:var(--card);border:1px solid var(--line);
    border-radius:8px;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo.picked{border:2px solid var(--accent)}
  .photo .del{position:absolute;top:6px;right:6px;background:rgba(10,10,10,.8);color:var(--dim);
    width:auto;padding:4px 8px;border-radius:6px;font-size:14px}
  .photo .badge{position:absolute;top:6px;left:6px;background:var(--accent);color:#0a0a0a;
    width:22px;height:22px;border-radius:50%;font-size:12px;padding:0;display:flex;align-items:center;justify-content:center}
  .cap{display:flex;justify-content:space-between;font-size:11px;color:var(--dimmer);margin-top:4px}

  .fab{position:fixed;right:16px;bottom:calc(76px + env(safe-area-inset-bottom));width:56px;height:56px;
    border-radius:50%;background:#262626;border:1px solid var(--line2);color:var(--accent);
    font-size:22px;padding:0;z-index:31;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .timer{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:31;padding:0 16px}
  .timer .card{margin:0 auto;max-width:480px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
  .clock{font-size:40px;font-weight:600;font-family:ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
  .clock.done{color:var(--good)}
  .presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
  .presets button{padding:10px 0;font-size:13px;background:var(--bg);border:1px solid var(--line);color:var(--dimmer);
    font-family:ui-monospace,Menlo,monospace}
  .presets button.on{background:#404040;color:var(--text)}
  .tbtn{width:48px;height:48px;padding:0;font-size:18px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);text-align:center}
  .stats .n{font-size:26px;font-family:ui-monospace,Menlo,monospace}
  .stats .l{font-size:11px;color:var(--dimmer)}
  .hide{display:none!important}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<button class="fab" id="fab" onclick="TIMER.open()">⏱</button>
<div class="timer" id="timer" style="display:none">
  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:10px">
      <span class="eyebrow" style="color:var(--dimmer)">Rest</span>
      <button class="icon" onclick="TIMER.close()">✕</button>
    </div>
    <div class="row">
      <div class="clock" id="clock">1:30</div>
      <div class="row" style="margin-left:auto">
        <button class="primary tbtn" id="playBtn" onclick="TIMER.toggle()">▶</button>
        <button class="ghost tbtn" onclick="TIMER.reset()">↺</button>
      </div>
    </div>
    <div class="presets" id="presets"></div>
  </div>
</div>

<nav class="nav" id="nav"></nav>

<script>
/* ============ constants ============ */
const KEY = "gymlog.v1";
const START = "2026-07-06";
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const SCHEMA = 7;   // bump whenever the saved data shape changes, and add a migration below
const DEFAULT_TARGETS = { calMin:2000, calMax:2200, pMin:150, pMax:200, cMin:180, cMax:280, fMin:50, fMax:80 };
const EMPTY = {
  schema:SCHEMA,
  templates:[{id:"A",name:"Workout A",exercises:[]},{id:"B",name:"Workout B",exercises:[]}],
  sessions:[], weights:[], photos:[], lastBackup:null,
  nutrition:{ targets:{...DEFAULT_TARGETS}, foods:[], log:{} }
};

let D = structuredClone(EMPTY);
let tab = "train", err = "", note = "";

/* ============ dates ============ */
const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const today = () => iso(new Date());
const pd = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const dow = s => DAYS[pd(s).getDay()];
const wk = s => Math.floor((pd(s)-pd(START))/864e5/7)+1;
const shortD = s => pd(s).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const ago = s => Math.floor((pd(today())-pd(s))/864e5);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============ migrations ============
   Each entry upgrades data from version N to N+1. They run in order, so a v1
   backup opened by a v5 app walks 1→2→3→4→5. Never edit an old migration once
   it has shipped; add a new one and bump SCHEMA.                              */
const MIGRATIONS = {
  // 1 → 2: one plan became two (A/B); sessions gained a workout tag; cardio arrived
  1(d){
    if(d.plan && !d.plans){ d.plans = { A:d.plan, B:[] }; delete d.plan; }
    if(!d.plans) d.plans = { A:[], B:[] };
    d.plans.A = d.plans.A || [];
    d.plans.B = d.plans.B || [];
    (d.sessions || []).forEach(s => { if(!s.workout) s.workout = "A"; });
    return d;
  },
  // 2 → 3: workout names became editable
  2(d){
    if(!d.names) d.names = { A:"Workout A", B:"Workout B" };
    return d;
  },
  // 3 → 4: fixed A/B plans became an open list of templates
  3(d){
    if(d.plans){                       // genuine pre-v4 data: rebuild from the old shape
      const names = d.names || {};
      const plans = d.plans;
      d.templates = ["A","B"].map(k => ({
        id: k,
        name: names[k] || ("Workout " + k),
        exercises: plans[k] || []
      }));
    } else if(!d.templates){           // safety net: nothing to convert, no templates yet
      d.templates = [
        { id:"A", name:"Workout A", exercises:[] },
        { id:"B", name:"Workout B", exercises:[] }
      ];
    }
    delete d.plans;
    delete d.names;
    return d;
  },
  // 4 → 5: nutrition tracker added
  4(d){
    if(!d.nutrition) d.nutrition = { targets:{ calMin:2000, calMax:2200, pMin:150, pMax:200, cMin:180, cMax:280, fMin:50, fMax:80 }, foods:[], log:{} };
    if(!d.nutrition.targets) d.nutrition.targets = { calMin:2000, calMax:2200, pMin:150, pMax:200, cMin:180, cMax:280, fMin:50, fMax:80 };
    if(!d.nutrition.foods) d.nutrition.foods = [];
    if(!d.nutrition.log) d.nutrition.log = {};
    return d;
  },
  // 5 → 6: foods can be defined by mass (g) or volume (ml); portions convert within the matching system
  5(d){
    const n = d.nutrition;
    if(n){
      (n.foods||[]).forEach(f => {
        if(f.amount === undefined){ f.amount = (f.grams !== undefined ? f.grams : 100); f.refUnit = "g"; delete f.grams; }
      });
      Object.values(n.log||{}).forEach(list => (list||[]).forEach(e => { if(!e.base) e.base = "g"; }));
    }
    return d;
  },
  // 6 → 7: (steps feature removed; kept as a no-op so v6 data still upgrades)
  6(d){
    return d;
  }
};

class NewerData extends Error {}

function migrate(raw){
  let v = Number(raw && raw.schema) || 1;
  if(v > SCHEMA) throw new NewerData(String(v));
  let d = Object.assign(structuredClone(EMPTY), raw || {});
  while(v < SCHEMA){
    const step = MIGRATIONS[v];
    if(!step) throw new Error("No migration from v" + v);
    d = step(d);
    v++;
  }
  d.schema = SCHEMA;
  return d;
}

/* ============ storage ============ */
function save(){
  try{ D.schema = SCHEMA; localStorage.setItem(KEY, JSON.stringify(D)); err=""; }
  catch(e){ err="Storage is full. Export a backup, then delete some photos."; }
}
function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return;
    D = migrate(JSON.parse(raw));
    save();                       // write the upgraded shape back
  }catch(e){
    err = e instanceof NewerData
      ? `This data was written by a newer version of the app (v${e.message}). Update the app before using it — nothing has been overwritten.`
      : "Saved data looks damaged. Restore from a backup file.";
  }
}
const IDB = {
  db:null,
  open(){
    if(this.db) return Promise.resolve(this.db);
    return new Promise((res,rej)=>{
      const r = indexedDB.open("gymlog",1);
      r.onupgradeneeded = () => r.result.createObjectStore("photos");
      r.onsuccess = () => { this.db=r.result; res(r.result); };
      r.onerror = () => rej(r.error);
    });
  },
  async tx(m){ const db = await this.open(); return db.transaction("photos",m).objectStore("photos"); },
  async put(k,v){ const s=await this.tx("readwrite"); return new Promise((res,rej)=>{ const q=s.put(v,k); q.onsuccess=res; q.onerror=()=>rej(q.error); }); },
  async get(k){ const s=await this.tx("readonly"); return new Promise((res,rej)=>{ const q=s.get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); },
  async del(k){ const s=await this.tx("readwrite"); return new Promise((res,rej)=>{ const q=s.delete(k); q.onsuccess=res; q.onerror=()=>rej(q.error); }); }
};

function compress(file){
  return new Promise((res,rej)=>{
    const fr = new FileReader();
    fr.onerror = () => rej(new Error("Couldn't read that file."));
    fr.onload = e => {
      const img = new Image();
      img.onerror = () => rej(new Error("That file isn't an image."));
      img.onload = () => {
        const s = Math.min(1, 1000/Math.max(img.width,img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.72));
      };
      img.src = e.target.result;
    };
    fr.readAsDataURL(file);
  });
}

/* ============ rest timer ============ */
const TIMER = {
  dur:60, left:60, running:false, endTime:0, tick:null, ctx:null, wake:null, panelOpen:false, alarmed:false,
  // show the button/panel only on the Train tab, respecting whether the panel is open
  sync(){
    const onTrain = (typeof tab !== "undefined") && tab === "train";
    const fab = document.getElementById("fab");
    const panel = document.getElementById("timer");
    if(fab) fab.style.display = (onTrain && !this.panelOpen) ? "" : "none";
    if(panel) panel.style.display = (onTrain && this.panelOpen) ? "" : "none";
  },
  open(){ this.panelOpen = true; this.sync(); this.draw(); },
  close(){ this.panelOpen = false; this.sync(); },
  pick(s){ this.dur = s; this.left = s; this.stopSilently(); this.draw(); },
  toggle(){ this.running ? this.stopSilently() : this.start(); },
  ensureCtx(){
    if(!this.ctx){ const AC = window.AudioContext || window.webkitAudioContext; if(AC) this.ctx = new AC(); }
    if(this.ctx && this.ctx.state === "suspended") this.ctx.resume();
  },
  start(){
    this.ensureCtx();
    if(this.left <= 0) this.left = this.dur;
    this.endTime = Date.now() + this.left*1000;
    this.running = true; this.alarmed = false;
    this.requestWake();
    clearInterval(this.tick);
    this.tick = setInterval(()=>this.onTick(), 250);
    this.draw();
  },
  onTick(){
    if(!this.running) return;
    const rem = Math.max(0, Math.round((this.endTime - Date.now())/1000));
    this.left = rem;
    if(rem <= 0) this.finish();
    this.draw();
  },
  finish(){
    this.running = false; clearInterval(this.tick); this.releaseWake();
    if(!this.alarmed){ this.alarmed = true; this.alarm(); }
    this.draw();
  },
  stopSilently(){ this.running = false; clearInterval(this.tick); this.releaseWake(); this.draw(); },
  reset(){ this.left = this.dur; this.running = false; clearInterval(this.tick); this.releaseWake(); this.draw(); },
  // when the app returns to the foreground, recompute from the timestamp and re-grab the wake lock
  onVisible(){
    if(!this.running) return;
    const rem = Math.max(0, Math.round((this.endTime - Date.now())/1000));
    this.left = rem;
    if(rem <= 0){ this.finish(); } else { this.requestWake(); }
    this.draw();
  },
  requestWake(){
    try { if("wakeLock" in navigator){ navigator.wakeLock.request("screen").then(w=>{ this.wake = w; }).catch(()=>{}); } } catch(e){}
  },
  releaseWake(){
    try { if(this.wake){ this.wake.release(); this.wake = null; } } catch(e){}
  },
  alarm(){
    try{
      if(this.ctx){
        const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.frequency.value=880;
        g.gain.setValueAtTime(.25,this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.7);
        o.start(); o.stop(this.ctx.currentTime+.7);
      }
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
    }catch(e){}
  },
  draw(){
    const c = document.getElementById("clock");
    if(!c) return;
    c.textContent = `${Math.floor(this.left/60)}:${String(this.left%60).padStart(2,"0")}`;
    c.className = "clock" + (this.left===0 ? " done" : "");
    document.getElementById("playBtn").textContent = this.running ? "❚❚" : "▶";
    document.getElementById("presets").innerHTML = [45,60,90,120].map(s=>
      `<button class="${s===this.dur?"on":""}" onclick="TIMER.pick(${s})">${s}s</button>`).join("");
  }
};

/* ============ train state ============ */
let trainDate = today();
let trainWorkout = "A";          // a template id, or "C" for cardio
let planWhich = "A";             // template id being edited on the Plan tab
let draft = [];                  // ordered rows for the day being edited
let cardioDraft = { minutes:"", miles:"" };
let justSaved = false;
let calOpen = false;
let calMonth = new Date();       // any date inside the shown month

const isCardio = w => w === "C";
const tpl = id => D.templates.find(t => t.id === id);
const wLabel = w => w==="C" ? "Cardio" : (tpl(w) ? tpl(w).name : "Workout");
const firstTemplateId = () => (D.templates[0] && D.templates[0].id) || "C";

// keep the two selections pointing at something that still exists
function ensureSelection(){
  if(!(trainWorkout === "C" || tpl(trainWorkout))) trainWorkout = firstTemplateId();
  if(!tpl(planWhich)) planWhich = (D.templates[0] && D.templates[0].id) || null;
}

function sessionOn(date, w){ return D.sessions.find(s=>s.date===date && s.workout===w); }

function lastLift(name){
  let found = null;
  [...D.sessions].sort((a,b)=>a.date.localeCompare(b.date))
    .forEach(s => (s.exercises||[]).forEach(e => { if(e.name===name) found = e; }));
  return found;
}
function lastLiftBefore(name, date){
  let found = null;
  [...D.sessions].filter(s => s.date < date).sort((a,b)=>a.date.localeCompare(b.date))
    .forEach(s => (s.exercises||[]).forEach(e => { if(e.name===name) found = e; }));
  return found;
}
function lastCardio(){
  const c = [...D.sessions].filter(s=>s.workout==="C").sort((a,b)=>a.date.localeCompare(b.date));
  return c.length ? c[c.length-1] : null;
}
function cardioText(s){
  const p = [];
  if(s.cardio && s.cardio.minutes) p.push(s.cardio.minutes+" min");
  if(s.cardio && s.cardio.miles) p.push(s.cardio.miles+" mi");
  return p.join(" · ") || "logged";
}

function seedDraft(){
  const ex = sessionOn(trainDate, trainWorkout);
  if(isCardio(trainWorkout)){
    cardioDraft = {
      minutes: ex && ex.cardio ? (ex.cardio.minutes||"") : "",
      miles:   ex && ex.cardio ? (ex.cardio.miles||"")   : ""
    };
  } else if(ex){
    // a logged day renders from its own saved snapshot, so editing the plan later never changes it
    draft = (ex.exercises||[]).map(e => ({ name:e.name, weight:e.weight, sets:e.sets, reps:e.reps }));
  } else {
    // no session yet: start from the current template
    const t = tpl(trainWorkout);
    draft = (t ? t.exercises : []).map(x => ({ name:x.name, weight:"", sets:x.sets, reps:x.reps }));
  }
  justSaved = false;
}

/* ============ calendar (shared) ============ */
function monthCalendar(sel, pickFn, dotsFn){
  const first = new Date(calMonth.getFullYear(), calMonth.getMonth(), 1);
  const days = new Date(calMonth.getFullYear(), calMonth.getMonth()+1, 0).getDate();
  let cells = "";
  DAYS.forEach(d => cells += `<div class="cd dow">${d[0]}</div>`);
  for(let i=0;i<first.getDay();i++) cells += `<div class="cd blank"></div>`;
  for(let d=1; d<=days; d++){
    const ds = iso(new Date(calMonth.getFullYear(), calMonth.getMonth(), d));
    const dots = dotsFn ? dotsFn(ds) : "";
    const cls = ["cd", ds===sel?"sel":"", ds===today()?"today":""].filter(Boolean).join(" ");
    cells += `<button class="${cls}" onclick="${pickFn}('${ds}')">${d}<span class="dots">${dots}</span></button>`;
  }
  return `<div class="cal">
    <div class="calhdr">
      <button class="arrow" onclick="shiftMonth(-1)">‹</button>
      <span>${MONTHS[calMonth.getMonth()]} ${calMonth.getFullYear()}</span>
      <button class="arrow" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="calgrid">${cells}</div>
    <button class="ghost" style="margin-top:10px;padding:10px;font-size:13px" onclick="${pickFn}('${today()}')">Jump to today</button>
  </div>`;
}
function trainDots(ds){
  return D.sessions.filter(s=>s.date===ds).map(s=>`<span class="dot ${s.workout==="C"?"c":""}"></span>`).join("");
}
function calendarHTML(){ return monthCalendar(trainDate, "pickDate", trainDots); }
function shiftMonth(n){ calMonth = new Date(calMonth.getFullYear(), calMonth.getMonth()+n, 1); render(); }
function pickDate(ds){ trainDate = ds; calMonth = pd(ds); calOpen = false; seedDraft(); render(); }
function toggleCal(){ calOpen = !calOpen; if(calOpen) calMonth = pd(trainDate); render(); }

function chartSVG(){
  const asc = [...D.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(asc.length < 2) return `<p class="sub" style="text-align:center;padding:24px 0">Log two weigh-ins and the graph appears.</p>`;
  const vals = asc.map(w=>w.value);
  const min = Math.min(...vals)-1, max = Math.max(...vals)+1;
  const W=440,H=160,L=34,R=8,T=10,B=22;
  const x = i => L + (i/(asc.length-1))*(W-L-R);
  const y = v => T + (1-(v-min)/(max-min))*(H-T-B);
  const pts = asc.map((w,i)=>`${x(i).toFixed(1)},${y(w.value).toFixed(1)}`).join(" ");
  const grid = [max,(max+min)/2,min].map(v=>
    `<line x1="${L}" y1="${y(v).toFixed(1)}" x2="${W-R}" y2="${y(v).toFixed(1)}" stroke="#262626"/>
     <text x="0" y="${(y(v)+4).toFixed(1)}" fill="#525252" font-size="10" font-family="monospace">${v.toFixed(1)}</text>`).join("");
  const dots = asc.map((w,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(w.value).toFixed(1)}" r="2.5" fill="#fbbf24"/>`).join("");
  return `<div class="card"><svg viewBox="0 0 ${W} ${H}" width="100%" height="170">
    ${grid}
    <polyline points="${pts}" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
    <text x="${L}" y="${H-4}" fill="#525252" font-size="10">${shortD(asc[0].date)}</text>
    <text x="${W-R}" y="${H-4}" fill="#525252" font-size="10" text-anchor="end">${shortD(asc[asc.length-1].date)}</text>
  </svg></div>`;
}

/* ============ diet ============ */
const MEALS = ["Breakfast","Lunch","Dinner","Snacks"];
const MASS = { g:1, oz:28.3495, lb:453.592 };                       // → grams
const VOL  = { ml:1, tbsp:14.7868, "fl oz":29.5735, cup:236.588 };  // → millilitres
const unitTable = base => base==="ml" ? VOL : MASS;

let dietDate = today();
let dietSub = "day";              // "day" | "foods" | "goals"
let dietRemaining = false;        // Consumed vs Remaining toggle
let dietCalOpen = false;
let addingMeal = null;            // meal name we're adding a food to
let foodFilter = "";
let mealCollapsed = {};           // meal name -> true when collapsed

const NUT = () => D.nutrition;
const round = n => Math.round(n);

// per-base-unit macros for a library food (nutrition stored for `amount` of `refUnit`)
function perBase(food){
  const a = food.amount || 1;
  return { cal:(+food.cal||0)/a, protein:(+food.protein||0)/a, carb:(+food.carb||0)/a, fat:(+food.fat||0)/a };
}
// base-unit quantity (grams or ml) for a log entry
function entryBase(e){ const t = unitTable(e.base); return (+e.qty||0) * (t[e.unit]||1); }
// macro totals for a log entry (uses the snapshot taken when it was added)
function entryMacros(e){
  const b = entryBase(e), p = e.per || {cal:0,protein:0,carb:0,fat:0};
  return { cal:b*p.cal, protein:b*p.protein, carb:b*p.carb, fat:b*p.fat };
}
function dayEntries(ds){ return NUT().log[ds] || []; }
function dayTotals(ds){
  return dayEntries(ds).reduce((t,e)=>{
    const m = entryMacros(e);
    t.cal+=m.cal; t.protein+=m.protein; t.carb+=m.carb; t.fat+=m.fat; return t;
  }, {cal:0,protein:0,carb:0,fat:0});
}
function dietDots(ds){
  return (NUT().log[ds] && NUT().log[ds].length) ? `<span class="dot" style="background:var(--cardio)"></span>` : "";
}

function macroRow(label, consumed, shown, min, max, color){
  const scale = max>0 ? max*1.2 : 1;                    // headroom so the max tick sits inside the bar
  const fillPct = Math.min(100, (consumed/scale)*100);
  const minPct = (min/scale)*100;
  const maxPct = (max/scale)*100;
  const ok = consumed>=min && (max===0 || consumed<=max);
  return `<div class="macro">
    <div class="top"><span>${label}</span>
      <span class="val">${ok?'<span class="up">✓</span> ':''}<b>${round(shown)}</b> <span style="color:var(--dimmer)">/ ${min}-${max}g</span></span>
    </div>
    <div class="mbar">
      <div style="width:${fillPct}%;background:${color}"></div>
      <span class="tick" style="left:${minPct}%"></span>
      <span class="tick" style="left:${maxPct}%"></span>
    </div>
  </div>`;
}

function viewDiet(){
  let h = `<div class="eyebrow">Nutrition</div><h2>Diet</h2><div style="height:14px"></div>`;
  h += `<div class="subseg">
    ${[["day","Day"],["foods","Foods"],["goals","Goals"]].map(([id,label])=>
      `<button class="${dietSub===id?"on":""}" onclick="setDietSub('${id}')">${label}</button>`).join("")}
  </div>`;
  if(dietSub==="foods") return h + dietFoods();
  if(dietSub==="goals") return h + dietGoals();
  return h + dietDay();
}

function dietDay(){
  const t = NUT().targets;
  const tot = dayTotals(dietDate);

  let h = `
  <div class="hdr">
    <button class="arrow" onclick="shiftDietDay(-1)">‹</button>
    <div class="mid" onclick="toggleDietCal()">
      <div class="eyebrow">${dow(dietDate)}</div>
      <h2>${shortD(dietDate)}</h2>
      <div class="caret">${dietCalOpen ? "▲ close calendar" : "▼ pick a date"}</div>
    </div>
    <button class="arrow" onclick="shiftDietDay(1)">›</button>
  </div>`;
  if(dietCalOpen) h += monthCalendar(dietDate, "pickDietDate", dietDots);

  // summary card
  const remaining = dietRemaining;
  const calScale = t.calMax>0 ? t.calMax*1.2 : 1;
  const calFill = Math.min(100, (tot.cal/calScale)*100);
  const calMinPct = (t.calMin/calScale)*100;
  const calMaxPct = (t.calMax/calScale)*100;
  const calOk = tot.cal>=t.calMin && tot.cal<=t.calMax;
  let calHead;
  if(remaining){
    const toMax = round(t.calMax - tot.cal);
    const toMin = round(t.calMin - tot.cal);
    if(tot.cal > t.calMax){
      calHead = `<span style="color:var(--bad)">${toMax}</span> <span>cal left</span>`;   // over top → negative, red
    } else if(tot.cal >= t.calMin){
      calHead = `${toMax} <span>cal left</span>`;                                          // in range → to top only
    } else {
      calHead = `${toMin}–${toMax} <span>cal left</span>`;                                  // under min → range to go
    }
  } else {
    calHead = `${round(tot.cal)} <span>/ ${t.calMin}-${t.calMax} cal</span>`;
  }
  h += `<div class="card">
    <div class="toggle">
      <button class="${!remaining?"on":""}" onclick="setRemaining(false)">Consumed</button>
      <button class="${remaining?"on":""}" onclick="setRemaining(true)">Remaining</button>
    </div>
    <div class="kcal">${calHead}</div>
    <div class="bar">
      <div style="width:${calFill}%;background:${calOk?'var(--good)':'var(--cardio)'}"></div>
      <span class="tick" style="left:${calMinPct}%"></span>
      <span class="tick" style="left:${calMaxPct}%"></span>
    </div>
    ${macroRow("Protein", tot.protein, remaining?Math.max(0,t.pMax-tot.protein):tot.protein, t.pMin, t.pMax, "#c4b5fd")}
    ${macroRow("Carbs",   tot.carb,    remaining?Math.max(0,t.cMax-tot.carb):tot.carb,       t.cMin, t.cMax, "var(--good)")}
    ${macroRow("Fat",     tot.fat,     remaining?Math.max(0,t.fMax-tot.fat):tot.fat,         t.fMin, t.fMax, "var(--accent)")}
  </div>`;

  // meals
  const yesterday = iso(new Date(pd(dietDate).getTime() - 864e5));
  MEALS.forEach(meal=>{
    const entries = dayEntries(dietDate).filter(e=>e.meal===meal);
    const mt = entries.reduce((s,e)=>{ const m=entryMacros(e); s.cal+=m.cal; s.p+=m.protein; return s; }, {cal:0,p:0});
    const collapsed = !!mealCollapsed[meal];
    const yCount = dayEntries(yesterday).filter(e=>e.meal===meal).length;
    h += `<div class="meal" data-meal="${meal}">
      <div class="mh">
        <div class="mtoggle" onclick="toggleMeal('${meal}')">
          <span class="caret" style="margin:0 6px 0 0;display:inline-block">${collapsed?"▸":"▾"}</span>
          <h3 style="display:inline">${meal}</h3>
        </div>
        <div>
          <span class="pill">${round(mt.cal)} Cal</span><span class="pill p">${round(mt.p)} P</span>
          <button class="plus" onclick="startAdd('${meal}')">+</button>
        </div>
      </div>`;
    if(!collapsed){
      entries.forEach(e=>{
        const food = NUT().foods.find(f=>f.id===e.foodId);
        const m = entryMacros(e);
        h += `<div class="fitem">
          <div style="flex:1">
            <div class="fn">${esc(e.name || (food?food.name:"(deleted food)"))}</div>
            <div class="qty">
              <input class="num" type="number" inputmode="decimal" value="${esc(e.qty)}" onchange="setEntryQty('${e.id}',this.value)">
              <select onchange="setEntryUnit('${e.id}',this.value)">
                ${Object.keys(unitTable(e.base)).map(u=>`<option value="${u}" ${e.unit===u?"selected":""}>${u}</option>`).join("")}
              </select>
              <button class="icon" onclick="delEntry('${e.id}')">🗑</button>
            </div>
          </div>
          <div class="fm"><b>${round(m.cal)}</b> cal<br><span style="color:var(--dimmer)">${round(m.protein)}g protein</span></div>
        </div>`;
      });
      if(!entries.length && yCount){
        h += `<div class="copyrow"><button class="ghost" onclick="copyYesterdayMeal('${meal}')">＋ Copy yesterday's ${meal} (${yCount})</button>
          <div class="sub" style="text-align:center;margin-top:6px">or swipe right on this meal</div></div>`;
      }
      if(addingMeal===meal) h += addPicker(meal);
    }
    h += `</div>`;
  });

  return h;
}

function addPicker(meal){
  const foods = NUT().foods.filter(f => !foodFilter || f.name.toLowerCase().includes(foodFilter.toLowerCase()));
  let h = `<div class="addbox">
    <input type="text" id="dietFilter" placeholder="Filter your foods…" value="${esc(foodFilter)}" oninput="setFoodFilter(this.value)">`;

      h += `<div class="pickrow">

}

        <div><label>fat g</label><input class="num" type="number" inputmode="decimal" value="${esc(f.fat)}" onchange="editFood('${f.id}','fat',this.value)"></div>
      </div>

      <select id="nfUnit"><option value="g">g</option><option value="ml">ml</option></select>
    </div>
    <div class="macros">
      <div><label>calories</label><input class="num" type="number" inputmode="decimal" id="nfCal" placeholder="0"></div>
      <div><label>protein g</label><input class="num" type="number" inputmode="decimal" id="nfP" placeholder="0"></div>
      <div><label>carbs g</label><input class="num" type="number" inputmode="decimal" id="nfC" placeholder="0"></div>
      <div><label>fat g</label><input class="num" type="number" inputmode="decimal" id="nfF" placeholder="0"></div>
    </div>
    <button class="primary" style="margin-top:10px" onclick="addFood()">+ Add food</button>

function dietGoals(){
  const t = NUT().targets;
  const pair = (label, minKey, maxKey, unit) => `
    <div class="card">

/* diet actions */
function setDietSub(s){ dietSub=s; addingMeal=null; render(); }
function shiftDietDay(n){ const d=pd(dietDate); d.setDate(d.getDate()+n); dietDate=iso(d); calMonth=pd(dietDate); addingMeal=null; render(); }
function pickDietDate(ds){ dietDate=ds; calMonth=pd(ds); dietCalOpen=false; addingMeal=null; render(); }
function toggleDietCal(){ dietCalOpen=!dietCalOpen; if(dietCalOpen) calMonth=pd(dietDate); render(); }
function setRemaining(v){ dietRemaining=v; render(); }
function startAdd(meal){ addingMeal=meal; foodFilter=""; render(); }
function toggleMeal(meal){ mealCollapsed[meal] = !mealCollapsed[meal]; render(); }
function copyYesterdayMeal(meal){
  const y = iso(new Date(pd(dietDate).getTime() - 864e5));
  const src = dayEntries(y).filter(e=>e.meal===meal);
  if(!src.length) return;
  const existing = dayEntries(dietDate).filter(e=>e.meal===meal);
  if(existing.length && !confirm(`Add yesterday's ${meal} (${src.length} items) on top of what's already here?`)) return;
  if(!NUT().log[dietDate]) NUT().log[dietDate] = [];
  src.forEach((e,k)=>{
    NUT().log[dietDate].push({ ...e, id:"e"+Date.now()+"_"+k });
  });
  mealCollapsed[meal] = false;
  save(); render();
}
function cancelAdd(){ addingMeal=null; render(); }
function setFoodFilter(v){ foodFilter=v; render(); }

function addEntry(meal, foodId){
  const food = NUT().foods.find(f=>f.id===foodId);
  if(!food) return;
  const base = food.refUnit || "g";
  const entry = { id:"e"+Date.now(), foodId, name:food.name, meal, qty:(food.amount||100), unit:base, base, per:perBase(food) };
  if(!NUT().log[dietDate]) NUT().log[dietDate] = [];
  NUT().log[dietDate].push(entry);
  save(); render();
}
function findEntry(id){
  const list = NUT().log[dietDate] || [];
  return list.find(e=>e.id===id);
}
function setEntryQty(id,v){ const e=findEntry(id); if(e){ e.qty=v; save(); render(); } }
function setEntryUnit(id,v){ const e=findEntry(id); if(e){ e.unit=v; save(); render(); } }
function delEntry(id){
  NUT().log[dietDate] = (NUT().log[dietDate]||[]).filter(e=>e.id!==id);
  if(!NUT().log[dietDate].length) delete NUT().log[dietDate];
  save(); render();
}

function addFood(){
  const name = document.getElementById("nfName").value.trim();
  if(!name){ err="Give the food a name."; render(); return; }
  const num = id => parseFloat(document.getElementById(id).value) || 0;
  NUT().foods.push({
    id:"f"+Date.now(), name,
    amount: num("nfAmount")||100,
    refUnit: document.getElementById("nfUnit").value,
    cal:num("nfCal"), protein:num("nfP"), carb:num("nfC"), fat:num("nfF")
  });
  NUT().foods.sort((a,b)=>a.name.localeCompare(b.name));
  save(); render();
}
function editFood(id,f,v){
  const food = NUT().foods.find(x=>x.id===id);
  if(!food) return;
  food[f] = (f==="name" || f==="refUnit") ? v : (parseFloat(v)||0);
  save();
  if(f==="name" || f==="refUnit") render();
}
function delFood(id){
  const food = NUT().foods.find(x=>x.id===id);
  if(!confirm(`Delete ${food?food.name:"this food"}? Days you've already logged keep their entries.`)) return;
  NUT().foods = NUT().foods.filter(x=>x.id!==id);
  save(); render();
}
function setTarget(k,v){ NUT().targets[k] = parseFloat(v)||0; save(); }

/* ============ actions ============ */
function shiftDay(n){ const d = pd(trainDate); d.setDate(d.getDate()+n); trainDate = iso(d); calMonth = pd(trainDate); seedDraft(); render(); }
function pickWorkout(w){ trainWorkout = w; seedDraft(); render(); }
function jumpTo(date,w){ trainDate=date; trainWorkout=w; calMonth=pd(date); calOpen=false; seedDraft(); render(); }
// shared hint HTML for a train row: last stats + volume, colored vs this session
function rowHintInner(d, prev){
  if(!prev) return "first time";
  const n = x => parseFloat(x) || 0;
  const up = d.weight !== "" && n(d.weight) > n(prev.weight);
  const lastVol = n(prev.weight)*n(prev.sets)*n(prev.reps);
  const curVol = (d.weight !== "") ? n(d.weight)*n(d.sets)*n(d.reps) : null;
  let s = `${up?"▲ ":""}last: ${esc(prev.weight)} lb · ${esc(prev.sets)}×${esc(prev.reps)} · vol ${round(lastVol)}`;
  if(curVol !== null){
    const cls = curVol > lastVol ? "up" : (curVol < lastVol ? "down" : "");
    const arw = curVol > lastVol ? "▲" : (curVol < lastVol ? "▼" : "•");
    s += ` <span class="${cls}">→ ${round(curVol)} ${arw}</span>`;
  }
  return s;
}
function setDraft(i,f,v){
  if(!draft[i]) return;
  draft[i][f] = v; justSaved = false;
  const el = document.getElementById("hint-"+i);
  if(el) el.innerHTML = rowHintInner(draft[i], lastLiftBefore(draft[i].name, trainDate));
}
function setCardio(f,v){ cardioDraft[f]=v; justSaved=false; }
function addLift(){ draft.push({ name:"", weight:"", sets:"3", reps:"10", custom:true }); justSaved=false; render(); }
function removeLift(i){ draft.splice(i,1); justSaved=false; render(); }
function moveDraft(i,dir){
  const j = i + dir;
  if(j < 0 || j >= draft.length) return;
  [draft[i], draft[j]] = [draft[j], draft[i]];
  justSaved = false; render();
}

function saveSession(){
  const exercises = draft
    .filter(r => (r.name||"").trim() !== "" && r.weight !== "")
    .map(r => ({ name:r.name.trim(), weight:r.weight, sets:r.sets, reps:r.reps }));
  if(!exercises.length){ err="Enter at least one lift with a weight before saving."; render(); return; }
  D.sessions = [...D.sessions.filter(s => !(s.date===trainDate && s.workout===trainWorkout)),
                { date:trainDate, workout:trainWorkout, exercises }]
                .sort((a,b)=>b.date.localeCompare(a.date));
  save(); justSaved=true; render();
}

function saveCardio(){
  const m = cardioDraft.minutes, mi = cardioDraft.miles;
  if(!m && !mi){ err="Enter minutes or miles — either one is enough."; render(); return; }
  D.sessions = [...D.sessions.filter(s => !(s.date===trainDate && s.workout==="C")),
                { date:trainDate, workout:"C", cardio:{ minutes:m, miles:mi } }]
                .sort((a,b)=>b.date.localeCompare(a.date));
  save(); justSaved=true; render();
}

function delSession(date,w){
  if(!confirm(`Delete ${wLabel(w)} on ${shortD(date)}?`)) return;
  D.sessions = D.sessions.filter(s => !(s.date===date && s.workout===w));
  save(); seedDraft(); render();
}

function pickPlan(w){ planWhich = w; render(); }
function addTemplate(){
  const id = "t" + Date.now();
  D.templates.push({ id, name:"New workout", exercises:[] });
  planWhich = id;
  save(); render();
}
function renameTemplate(id, v){
  const t = tpl(id);
  if(t){ t.name = v.trim() || "Workout"; save(); render(); }
}
function deleteTemplate(id){
  const t = tpl(id);
  if(!t) return;
  const used = D.sessions.some(s => s.workout === id);
  const msg = used
    ? `Delete the “${t.name}” template? Sessions you already logged under it stay in your history — you just can't start new ones from it.`
    : `Delete the “${t.name}” template?`;
  if(!confirm(msg)) return;
  D.templates = D.templates.filter(x => x.id !== id);
  ensureSelection();

}
function addPlan(){
  const t = tpl(planWhich); if(!t) return;
  const name = document.getElementById("newName").value.trim();
  if(!name) return;
  const sets = document.getElementById("newSets").value || "3";
  const reps = document.getElementById("newReps").value || "10";
  t.exercises.push({ id:Date.now(), name, sets, reps });

}
function editPlan(id,f,v){
  const t = tpl(planWhich); if(!t) return;
  t.exercises = t.exercises.map(ex => ex.id===id ? {...ex,[f]:v} : ex);
  save(); seedDraft();
}
function delPlan(id){
  const t = tpl(planWhich); if(!t) return;
  t.exercises = t.exercises.filter(ex => ex.id!==id);
  save(); seedDraft(); render();
}
function movePlan(id,dir){
  const t = tpl(planWhich); if(!t) return;
  const i = t.exercises.findIndex(e=>e.id===id);
  const j = i + dir;
  if(i<0 || j<0 || j>=t.exercises.length) return;
  [t.exercises[i], t.exercises[j]] = [t.exercises[j], t.exercises[i]];
  save(); seedDraft(); render();
}

function addWeight(){
  const date = document.getElementById("wDate").value;
  const val = parseFloat(document.getElementById("wVal").value);
  if(!date || isNaN(val)) return;
  D.weights = [...D.weights.filter(w=>w.date!==date), {date,value:val}].sort((a,b)=>b.date.localeCompare(a.date));
  save(); render();
}
function delWeight(date){ D.weights = D.weights.filter(w=>w.date!==date); save(); render(); }

async function addPhoto(e){
  const file = e.target.files[0];
  const date = document.getElementById("pDate").value || today();
  if(!file) return;
  try{
    const url = await compress(file);
    const id = String(Date.now());
    await IDB.put(id,url);
    D.photos = [{id,date}, ...D.photos].sort((a,b)=>b.date.localeCompare(a.date));
    save(); render();
  }catch(ex){ err = ex.message || "That photo didn't save."; render(); }
  e.target.value = "";
}
async function delPhoto(id){
  if(!confirm("Delete this photo?")) return;
  D.photos = D.photos.filter(p=>p.id!==id);
  compare = compare.filter(c=>c!==id);
  save(); render();
  try{ await IDB.del(id); }catch(e){}
}
function toggleCompare(id){
  const i = compare.indexOf(id);
  if(i >= 0) compare.splice(i,1);
  else if(compare.length < 2) compare.push(id);
  else compare = [compare[1], id];
  render();
}
function clearCompare(){ compare = []; render(); }

async function paintPhotos(){
  const targets = [...D.photos.map(p=>["img-"+p.id, p.id]), ...compare.map(id=>["cmp-"+id, id])];
  for(const [elId, pid] of targets){
    const el = document.getElementById(elId);
    if(!el || el.src) continue;
    try{ const url = await IDB.get(pid); if(url) el.src = url; }catch(e){}
  }
}

async function exportAll(){
  note = "";
  try{
    const photos = {};
    for(const p of D.photos){ const u = await IDB.get(p.id); if(u) photos[p.id] = u; }
    const blob = new Blob([JSON.stringify({app:"gymlog",version:SCHEMA,exported:today(),data:D,photos})],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `gym-backup-${today()}.json`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href),2000);
    D.lastBackup = today(); save();
    note = "Exported. In the share sheet choose Save to Files → iCloud Drive.";
  }catch(e){ err = "Export failed. Try again."; }
  render();
}
async function importAll(e){
  const file = e.target.files[0];
  if(!file) return;
  note = "";
  try{
    const parsed = JSON.parse(await file.text());
    if(!parsed || !parsed.data) throw new Error("bad file");

    const v = Number(parsed.version) || Number(parsed.data.schema) || 1;
    if(v > SCHEMA){
      err = `That backup was written by a newer version of the app (v${v}). Update the app first — the file is fine, and nothing has been changed.`;
      e.target.value = ""; render(); return;
    }

    const upgraded = migrate(Object.assign({}, parsed.data, { schema:v }));   // throws before anything is written
    for(const [id,url] of Object.entries(parsed.photos || {})) await IDB.put(id,url);
    D = upgraded;
    save(); ensureSelection(); seedDraft();
    note = v < SCHEMA
      ? `Restored from a v${v} backup and upgraded to v${SCHEMA}.`
      : "Restored from backup.";
  }catch(ex){ err = "That file isn't a gym backup, or it's damaged. Nothing was changed."; }
  e.target.value = "";
  render();
}

/* ============ render ============ */
function render(){
  // remember which text field was focused, so a re-render doesn't drop the keyboard mid-type
  const act = document.activeElement;
  let focus = null;
  if(act && act.id && act.tagName === "INPUT"){
    let sel = null;
    try { sel = { s:act.selectionStart, e:act.selectionEnd }; } catch(_) {}
    focus = { id:act.id, sel };
  }

  const views = { train:viewTrain, plan:viewPlan, diet:viewDiet, weight:viewWeight, photos:viewPhotos, backup:viewBackup };
  document.getElementById("app").innerHTML =
    (err ? `<div class="err">${esc(err)}</div>` : "") + views[tab]();
  document.getElementById("nav").innerHTML =
    [["train","Train"],["plan","Plan"],["diet","Diet"],["weight","Weight"],["photos","Photos"],["backup","Backup"]]
    .map(([id,label]) => `<button class="${tab===id?"on":""}" onclick="go('${id}')">${label}</button>`).join("");

  if(focus){
    const el = document.getElementById(focus.id);
    if(el){ el.focus(); if(focus.sel){ try { el.setSelectionRange(focus.sel.s, focus.sel.e); } catch(_) {} } }
  }
  if(tab === "photos") paintPhotos();
  TIMER.sync();
  TIMER.draw();
}
function go(t){ err=""; note=""; tab=t; if(t==="train") seedDraft(); render(); }

// swipe right on a meal (in the diet day view) copies yesterday's items for that meal
let swMeal=null, swX=0, swY=0;
document.addEventListener("touchstart", e=>{
  const m = e.target.closest && e.target.closest("[data-meal]");
  if(m){ swMeal = m.getAttribute("data-meal"); swX = e.touches[0].clientX; swY = e.touches[0].clientY; }
  else swMeal = null;
}, {passive:true});
document.addEventListener("touchend", e=>{
  if(!swMeal) return;
  const dx = e.changedTouches[0].clientX - swX;
  const dy = Math.abs(e.changedTouches[0].clientY - swY);
  if(dx > 60 && dy < 40){ copyYesterdayMeal(swMeal); }
  swMeal = null;
}, {passive:true});

load();
ensureSelection();
seedDraft();
render();
</script>
