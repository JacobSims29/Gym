<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Log">
<meta name="theme-color" content="#0a0a0a">
<title>Gym Log</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  :root{
    --bg:#0a0a0a; --card:#171717; --line:#262626; --line2:#404040;
    --text:#f5f5f5; --dim:#a3a3a3; --dimmer:#525252;
    --accent:#fbbf24; --good:#34d399; --bad:#f87171;
  }
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:var(--bg); color:var(--text);
    padding-bottom:calc(120px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:480px;margin:0 auto;padding:16px}
  .mono{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-variant-numeric:tabular-nums}

  .eyebrow{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);font-weight:600}
  h2{font-size:24px;font-weight:600;letter-spacing:-.02em;margin-top:2px}
  .sub{font-size:13px;color:var(--dimmer);margin-top:4px}

  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px;margin-bottom:12px}
  .row{display:flex;align-items:center;gap:8px}
  .grow{flex:1}

  input,select{
    background:var(--bg);border:1px solid var(--line2);border-radius:6px;
    color:var(--text);padding:12px;font-size:16px;font-family:inherit;width:100%;
  }
  input:focus{outline:none;border-color:var(--accent)}
  input.num{font-family:ui-monospace,Menlo,monospace;text-align:center;font-variant-numeric:tabular-nums}
  input.sr{width:52px;padding:12px 4px;color:var(--dim);border-color:var(--line)}

  button{font-family:inherit;font-size:15px;font-weight:600;border:none;border-radius:8px;
    padding:14px;cursor:pointer;background:var(--card);color:var(--text);width:100%}
  .primary{background:var(--accent);color:#0a0a0a}
  .ghost{background:#262626;color:var(--text)}
  .saved{background:#059669;color:#fff}
  .icon{width:auto;padding:8px;background:none;color:var(--dimmer);font-size:18px}
  .icon:hover{color:var(--bad)}

  .seg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
  .seg button{border:1px solid var(--line);background:var(--card);color:var(--dimmer)}
  .seg button.on{border-color:var(--accent);background:#262626;color:var(--text)}

  .nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);
    display:grid;grid-template-columns:repeat(5,1fr);padding-bottom:env(safe-area-inset-bottom);z-index:30}
  .nav button{background:none;border-radius:0;font-size:11px;font-weight:600;color:var(--dimmer);
    padding:14px 0;border-top:2px solid transparent}
  .nav button.on{color:var(--accent);border-top-color:var(--accent)}

  .lift{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .lift h3{font-size:16px;font-weight:600}
  .last{font-size:11px;color:var(--dimmer);font-family:ui-monospace,Menlo,monospace}
  .up{color:var(--good)}

  .hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .hdr .mid{text-align:center}
  .arrow{background:none;color:var(--dimmer);font-size:22px;width:44px;padding:8px}

  .list-row{display:flex;justify-content:space-between;align-items:center;padding:10px 4px;
    border-bottom:1px solid var(--line)}
  .list-row:last-child{border-bottom:none}

  .empty{border:1px dashed var(--line2);border-radius:10px;padding:32px 16px;text-align:center;color:var(--dimmer);font-size:14px}
  .warn{background:#422006;border:1px solid #78350f;color:#fcd34d;padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px}
  .ok{color:var(--good);font-size:13px;margin-top:8px}
  .err{background:#450a0a;border:1px solid #7f1d1d;color:#fca5a5;padding:12px;border-radius:8px;font-size:13px;margin-bottom:12px}

  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .photo{position:relative;aspect-ratio:1;background:var(--card);border:1px solid var(--line);
    border-radius:8px;overflow:hidden}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .photo .del{position:absolute;top:6px;right:6px;background:rgba(10,10,10,.8);color:var(--dim);
    width:auto;padding:4px 8px;border-radius:6px;font-size:14px}
  .cap{display:flex;justify-content:space-between;font-size:11px;color:var(--dimmer);margin-top:4px}

  /* rest timer */
  .fab{position:fixed;right:16px;bottom:calc(76px + env(safe-area-inset-bottom));width:56px;height:56px;
    border-radius:50%;background:#262626;border:1px solid var(--line2);color:var(--accent);
    font-size:22px;padding:0;z-index:31;box-shadow:0 4px 16px rgba(0,0,0,.5)}
  .timer{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));z-index:31;padding:0 16px}
  .timer .card{margin:0 auto;max-width:480px;box-shadow:0 4px 24px rgba(0,0,0,.6)}
  .clock{font-size:40px;font-weight:600;font-family:ui-monospace,Menlo,monospace;font-variant-numeric:tabular-nums}
  .clock.done{color:var(--good)}
  .presets{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:12px}
  .presets button{padding:10px 0;font-size:13px;background:var(--bg);border:1px solid var(--line);color:var(--dimmer);
    font-family:ui-monospace,Menlo,monospace}
  .presets button.on{background:#404040;color:var(--text)}
  .tbtn{width:48px;height:48px;padding:0;font-size:18px}

  .stats{display:grid;grid-template-columns:repeat(3,1fr);text-align:center}
  .stats .n{font-size:26px;font-family:ui-monospace,Menlo,monospace}
  .stats .l{font-size:11px;color:var(--dimmer)}
  .hide{display:none!important}
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<button class="fab" id="fab" onclick="TIMER.open()">⏱</button>
<div class="timer hide" id="timer">
  <div class="card">
    <div class="row" style="justify-content:space-between;margin-bottom:10px">
      <span class="eyebrow" style="color:var(--dimmer)">Rest</span>
      <button class="icon" onclick="TIMER.close()">✕</button>
    </div>
    <div class="row">
      <div class="clock" id="clock">1:30</div>
      <div class="row" style="margin-left:auto">
        <button class="primary tbtn" id="playBtn" onclick="TIMER.toggle()">▶</button>
        <button class="ghost tbtn" onclick="TIMER.reset()">↺</button>
      </div>
    </div>
    <div class="presets" id="presets"></div>
  </div>
</div>

<nav class="nav" id="nav"></nav>

<script>
/* ============ constants ============ */
const KEY = "gymlog.v1";
const START = "2026-07-06";           // Week 1 Monday
const DAYS = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const EMPTY = { plans:{A:[],B:[]}, sessions:[], weights:[], photos:[], lastBackup:null };

let D = structuredClone(EMPTY);
let tab = "train";
let err = "";

/* ============ dates (local, never UTC) ============ */
const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const today = () => iso(new Date());
const pd = s => { const [y,m,d]=s.split("-").map(Number); return new Date(y,m-1,d); };
const dow = s => DAYS[pd(s).getDay()];
const wk = s => Math.floor((pd(s)-pd(START))/864e5/7)+1;
const shortD = s => pd(s).toLocaleDateString("en-US",{month:"short",day:"numeric"});
const ago = s => Math.floor((pd(today())-pd(s))/864e5);
const esc = s => String(s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* ============ storage: core in localStorage, photos in IndexedDB ============ */
function save(){
  try { localStorage.setItem(KEY, JSON.stringify(D)); err=""; }
  catch(e){ err="Storage is full. Export a backup, then delete some photos."; }
}
function load(){
  try { const raw = localStorage.getItem(KEY); if(raw) D = Object.assign(structuredClone(EMPTY), JSON.parse(raw)); }
  catch(e){ err="Saved data looks damaged. Restore from a backup file."; }
}

const IDB = {
  db:null,
  open(){
    if(this.db) return Promise.resolve(this.db);
    return new Promise((res,rej)=>{
      const r = indexedDB.open("gymlog",1);
      r.onupgradeneeded = () => r.result.createObjectStore("photos");
      r.onsuccess = () => { this.db=r.result; res(r.result); };
      r.onerror = () => rej(r.error);
    });
  },
  async tx(mode){ const db = await this.open(); return db.transaction("photos",mode).objectStore("photos"); },
  async put(k,v){ const s=await this.tx("readwrite"); return new Promise((res,rej)=>{ const q=s.put(v,k); q.onsuccess=res; q.onerror=()=>rej(q.error); }); },
  async get(k){ const s=await this.tx("readonly"); return new Promise((res,rej)=>{ const q=s.get(k); q.onsuccess=()=>res(q.result); q.onerror=()=>rej(q.error); }); },
  async del(k){ const s=await this.tx("readwrite"); return new Promise((res,rej)=>{ const q=s.delete(k); q.onsuccess=res; q.onerror=()=>rej(q.error); }); }
};

/* ============ image compression ============ */
function compress(file){
  return new Promise((res,rej)=>{
    const fr = new FileReader();
    fr.onerror = () => rej(new Error("Couldn't read that file."));
    fr.onload = e => {
      const img = new Image();
      img.onerror = () => rej(new Error("That file isn't an image."));
      img.onload = () => {
        const s = Math.min(1, 1000/Math.max(img.width,img.height));
        const c = document.createElement("canvas");
        c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
        c.getContext("2d").drawImage(img,0,0,c.width,c.height);
        res(c.toDataURL("image/jpeg",0.72));
      };
      img.src = e.target.result;
    };
    fr.readAsDataURL(file);
  });
}

/* ============ rest timer ============ */
const TIMER = {
  dur:90, left:90, running:false, tick:null, ctx:null,
  open(){ document.getElementById("timer").classList.remove("hide"); document.getElementById("fab").classList.add("hide"); this.draw(); },
  close(){ document.getElementById("timer").classList.add("hide"); document.getElementById("fab").classList.remove("hide"); },
  pick(s){ this.dur=s; this.left=s; this.stop(); this.draw(); },
  toggle(){ this.running ? this.stop() : this.start(); },
  start(){
    // AudioContext must be created inside a tap or iOS keeps it muted
    if(!this.ctx){ const AC = window.AudioContext || window.webkitAudioContext; if(AC) this.ctx = new AC(); }
    if(this.ctx && this.ctx.state === "suspended") this.ctx.resume();
    if(this.left === 0) this.left = this.dur;
    this.running = true;
    this.tick = setInterval(()=>{
      this.left--;
      if(this.left <= 0){ this.left = 0; this.stop(); this.alarm(); }
      this.draw();
    },1000);
    this.draw();
  },
  stop(){ this.running=false; clearInterval(this.tick); this.draw(); },
  reset(){ this.left=this.dur; this.stop(); this.draw(); },
  alarm(){
    try{
      if(this.ctx){
        const o=this.ctx.createOscillator(), g=this.ctx.createGain();
        o.connect(g); g.connect(this.ctx.destination);
        o.frequency.value=880;
        g.gain.setValueAtTime(.25,this.ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+.7);
        o.start(); o.stop(this.ctx.currentTime+.7);
      }
      if(navigator.vibrate) navigator.vibrate([200,100,200]);
    }catch(e){ /* silent is fine, the clock still turns green */ }
  },
  draw(){
    const c = document.getElementById("clock");
    if(!c) return;
    c.textContent = `${Math.floor(this.left/60)}:${String(this.left%60).padStart(2,"0")}`;
    c.className = "clock" + (this.left===0 ? " done" : "");
    document.getElementById("playBtn").textContent = this.running ? "❚❚" : "▶";
    document.getElementById("presets").innerHTML = [60,90,120,180].map(s=>
      `<button class="${s===this.dur?"on":""}" onclick="TIMER.pick(${s})">${s}s</button>`).join("");
  }
};

/* ============ views ============ */
let trainDate = today();
let trainWorkout = "A";
let planWhich = "A";
let draft = {};      // exercise id -> {weight,sets,reps}
let justSaved = false;
let note = "";

function lastLift(name){
  let found = null;
  [...D.sessions].sort((a,b)=>a.date.localeCompare(b.date))
    .forEach(s => s.exercises.forEach(e => { if(e.name===name) found = e; }));
  return found;
}

function seedDraft(){
  const plan = D.plans[trainWorkout] || [];
  const existing = D.sessions.find(s=>s.date===trainDate && s.workout===trainWorkout);
  draft = {};
  plan.forEach(ex=>{
    const done = existing && existing.exercises.find(e=>e.name===ex.name);
    draft[ex.id] = {
      weight: done ? done.weight : "",
      sets:   done ? done.sets : ex.sets,
      reps:   done ? done.reps : ex.reps
    };
  });
  justSaved = false;
}

function viewTrain(){
  const plan = D.plans[trainWorkout] || [];
  const existing = D.sessions.find(s=>s.date===trainDate && s.workout===trainWorkout);

  let h = `
  <div class="hdr">
    <button class="arrow" onclick="shiftDay(-1)">‹</button>
    <div class="mid">
      <div class="eyebrow">Week ${wk(trainDate)} · ${dow(trainDate)}</div>
      <h2>${shortD(trainDate)}</h2>
    </div>
    <button class="arrow" onclick="shiftDay(1)">›</button>
  </div>
  <div class="seg">
    ${["A","B"].map(w=>{
      const done = D.sessions.some(s=>s.date===trainDate && s.workout===w);
      return `<button class="${trainWorkout===w?"on":""}" onclick="pickWorkout('${w}')">Workout ${w}${done?' <span class="up">✓</span>':""}</button>`;
    }).join("")}
  </div>`;

  if(!plan.length){
    h += `<div class="empty">Workout ${trainWorkout} has no lifts yet.<br>Add them on the Plan tab.</div>`;
    return h;
  }

  plan.forEach(ex=>{
    const d = draft[ex.id] || {weight:"",sets:ex.sets,reps:ex.reps};
    const prev = lastLift(ex.name);
    const up = prev && d.weight !== "" && parseFloat(d.weight) > parseFloat(prev.weight);
    h += `
    <div class="card">
      <div class="lift">
        <h3>${esc(ex.name)}</h3>
        <span class="last ${up?"up":""}">${prev ? `${up?"▲ ":""}last: ${esc(prev.weight)} lb · ${esc(prev.sets)}×${esc(prev.reps)}` : "first time"}</span>
      </div>
      <div class="row">
        <input class="num grow" type="number" inputmode="decimal" placeholder="${prev?esc(prev.weight):"lb"}"
          value="${esc(d.weight)}" oninput="setDraft(${ex.id},'weight',this.value)">
        <input class="num sr" type="number" inputmode="numeric" value="${esc(d.sets)}" oninput="setDraft(${ex.id},'sets',this.value)">
        <span style="color:var(--dimmer)">×</span>
        <input class="num sr" type="number" inputmode="numeric" value="${esc(d.reps)}" oninput="setDraft(${ex.id},'reps',this.value)">
      </div>
    </div>`;
  });

  h += `<button class="${justSaved?"saved":"primary"}" onclick="saveSession()">
    ${justSaved ? "✓ Saved" : existing ? `Update workout ${trainWorkout}` : `Save workout ${trainWorkout}`}
  </button>`;

  if(D.sessions.length){
    h += `<div style="margin-top:24px"><div class="eyebrow" style="color:var(--dimmer)">History</div><div class="card" style="margin-top:8px">`;
    D.sessions.slice(0,8).forEach(s=>{
      h += `<div class="list-row" onclick="jumpTo('${s.date}','${s.workout}')" style="cursor:pointer">
        <span style="font-size:14px;color:var(--dim)">${dow(s.date)} ${shortD(s.date)} <span class="mono" style="color:var(--dimmer)">${s.workout}</span></span>
        <span class="mono" style="font-size:12px;color:var(--dimmer)">${s.exercises.length} lifts</span>
      </div>`;
    });
    h += `</div></div>`;
  }
  return h;
}

function viewPlan(){
  const list = D.plans[planWhich] || [];
  const stale = !D.lastBackup || ago(D.lastBackup) > 14;
  let h = `
  <div class="eyebrow">The plan</div>
  <h2>Full body · M/W/F</h2>
  <p class="sub">Sets and reps live here. Weight gets logged per session.</p>
  <div style="height:16px"></div>`;

  if(stale) h += `<div class="warn">${D.lastBackup ? `Last backup: ${ago(D.lastBackup)} days ago.` : "No backup yet."} Export one from the Backup tab.</div>`;

  h += `<div class="seg">${["A","B"].map(w=>
    `<button class="${planWhich===w?"on":""}" onclick="pickPlan('${w}')">Workout ${w} <span class="mono" style="color:var(--dimmer)">${(D.plans[w]||[]).length}</span></button>`
  ).join("")}</div>`;

  if(list.length){
    h += `<div class="card">`;
    list.forEach(ex=>{
      h += `<div class="list-row">
        <span class="grow" style="font-weight:500">${esc(ex.name)}</span>
        <input class="num sr" type="number" inputmode="numeric" value="${esc(ex.sets)}" onchange="editPlan(${ex.id},'sets',this.value)">
        <span style="color:var(--dimmer);font-size:13px">×</span>
        <input class="num sr" type="number" inputmode="numeric" value="${esc(ex.reps)}" onchange="editPlan(${ex.id},'reps',this.value)">
        <button class="icon" onclick="delPlan(${ex.id})">🗑</button>
      </div>`;
    });
    h += `</div>`;
  } else {
    h += `<div class="empty">Workout ${planWhich} is empty.</div><div style="height:12px"></div>`;
  }

  h += `
  <div class="card">
    <input type="text" id="newName" placeholder="Add a lift to workout ${planWhich}">
    <div class="row" style="margin:12px 0">
      <input class="num" style="width:64px" type="number" inputmode="numeric" id="newSets" value="3">
      <span style="color:var(--dimmer)">sets ×</span>
      <input class="num" style="width:64px" type="number" inputmode="numeric" id="newReps" value="10">
      <span style="color:var(--dimmer)">reps</span>
    </div>
    <button class="ghost" onclick="addPlan()">+ Add exercise</button>
  </div>`;
  return h;
}

function chartSVG(){
  const asc = [...D.weights].sort((a,b)=>a.date.localeCompare(b.date));
  if(asc.length < 2) return `<p class="sub" style="text-align:center;padding:24px 0">Log two weigh-ins and the graph appears.</p>`;
  const vals = asc.map(w=>w.value);
  const min = Math.min(...vals) - 1, max = Math.max(...vals) + 1;
  const W=440, H=160, L=34, R=8, T=10, B=22;
  const x = i => L + (i/(asc.length-1))*(W-L-R);
  const y = v => T + (1-(v-min)/(max-min))*(H-T-B);
  const pts = asc.map((w,i)=>`${x(i).toFixed(1)},${y(w.value).toFixed(1)}`).join(" ");
  const grid = [max, (max+min)/2, min].map(v=>
    `<line x1="${L}" y1="${y(v).toFixed(1)}" x2="${W-R}" y2="${y(v).toFixed(1)}" stroke="#262626"/>
     <text x="0" y="${(y(v)+4).toFixed(1)}" fill="#525252" font-size="10" font-family="monospace">${v.toFixed(1)}</text>`
  ).join("");
  const dots = asc.map((w,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${y(w.value).toFixed(1)}" r="2.5" fill="#fbbf24"/>`).join("");
  return `<div class="card"><svg viewBox="0 0 ${W} ${H}" width="100%" height="170">
    ${grid}
    <polyline points="${pts}" fill="none" stroke="#fbbf24" stroke-width="2" stroke-linejoin="round"/>
    ${dots}
    <text x="${L}" y="${H-4}" fill="#525252" font-size="10">${shortD(asc[0].date)}</text>
    <text x="${W-R}" y="${H-4}" fill="#525252" font-size="10" text-anchor="end">${shortD(asc[asc.length-1].date)}</text>
  </svg></div>`;
}

function viewWeight(){
  const asc = [...D.weights].sort((a,b)=>a.date.localeCompare(b.date));
  const cur = asc.length ? asc[asc.length-1].value : null;
  const delta = asc.length > 1 ? (asc[asc.length-1].value - asc[0].value) : null;

  let h = `
  <div class="row" style="align-items:flex-end;justify-content:space-between;margin-bottom:16px">
    <div>
      <div class="eyebrow">Bodyweight</div>
      <h2 class="mono">${cur !== null ? cur+" lb" : "—"}</h2>
    </div>
    ${delta !== null ? `<span class="mono" style="font-size:13px;color:${delta<0?"var(--good)":"var(--dim)"}">${delta>0?"+":""}${delta.toFixed(1)} lb since start</span>` : ""}
  </div>
  ${chartSVG()}
  <div class="card">
    <div class="row" style="margin-bottom:12px">
      <input type="date" id="wDate" class="grow" value="${today()}">
      <input class="num" style="width:96px" type="number" inputmode="decimal" step="0.1" id="wVal" placeholder="lb">
    </div>
    <button class="primary" onclick="addWeight()">Log weight</button>
  </div>`;

  if(D.weights.length){
    h += `<div class="card">`;
    D.weights.forEach(w=>{
      h += `<div class="list-row">
        <span style="font-size:14px;color:var(--dim)">${dow(w.date)} ${shortD(w.date)}</span>
        <span class="row"><span class="mono">${w.value} lb</span><button class="icon" onclick="delWeight('${w.date}')">🗑</button></span>
      </div>`;
    });
    h += `</div>`;
  }
  return h;
}

function viewPhotos(){
  let h = `
  <div class="eyebrow">Progress</div>
  <h2>Photos</h2>
  <div style="height:16px"></div>
  <div class="card">
    <input type="date" id="pDate" value="${today()}" style="margin-bottom:12px">
    <input type="file" accept="image/*" id="pFile" class="hide" onchange="addPhoto(event)">
    <button class="ghost" onclick="document.getElementById('pFile').click()">📷 Add photo</button>
  </div>`;

  if(!D.photos.length){
    h += `<div class="empty">No photos yet.<br>Same light, same angle, same time of day works best.</div>`;
    return h;
  }
  h += `<div class="grid2">`;
  D.photos.forEach(p=>{
    h += `<div>
      <div class="photo">
        <img id="img-${p.id}" alt="Progress photo, ${shortD(p.date)}">
        <button class="del" onclick="delPhoto('${p.id}')">🗑</button>
      </div>
      <div class="cap"><span>${shortD(p.date)}</span><span class="mono">wk ${wk(p.date)}</span></div>
    </div>`;
  });
  h += `</div>`;
  return h;
}

function viewBackup(){
  const stale = !D.lastBackup || ago(D.lastBackup) > 14;
  return `
  <div class="eyebrow">Your data</div>
  <h2>Backup</h2>
  <div style="height:16px"></div>
  <div class="card stats">
    <div><div class="n">${D.sessions.length}</div><div class="l">sessions</div></div>
    <div><div class="n">${D.weights.length}</div><div class="l">weigh-ins</div></div>
    <div><div class="n">${D.photos.length}</div><div class="l">photos</div></div>
  </div>
  <div class="${stale?"warn":"card"}" style="font-size:13px;color:${stale?"":"var(--dim)"}">
    ${D.lastBackup ? `Last export: ${shortD(D.lastBackup)} (${ago(D.lastBackup)} days ago)` : "Never exported."}
  </div>
  <button class="primary" onclick="exportAll()" style="margin-bottom:12px">⬇ Export everything</button>
  <input type="file" accept="application/json" id="impFile" class="hide" onchange="importAll(event)">
  <button class="ghost" onclick="document.getElementById('impFile').click()">⬆ Restore from a backup file</button>
  ${note ? `<p class="ok">${esc(note)}</p>` : ""}
  <p class="sub" style="margin-top:16px;line-height:1.5">
    Export writes one JSON file holding both plans, every session, every weigh-in, and every photo.
    In the share sheet choose Save to Files → iCloud Drive. Restoring replaces everything currently in the app.
  </p>`;
}

/* ============ actions ============ */
function shiftDay(n){ const d = pd(trainDate); d.setDate(d.getDate()+n); trainDate = iso(d); seedDraft(); render(); }
function pickWorkout(w){ trainWorkout = w; seedDraft(); render(); }
function jumpTo(date,w){ trainDate=date; trainWorkout=w; seedDraft(); render(); }
function setDraft(id,f,v){ if(!draft[id]) draft[id]={}; draft[id][f]=v; justSaved=false; }

function saveSession(){
  const plan = D.plans[trainWorkout] || [];
  const exercises = plan
    .filter(ex => draft[ex.id] && draft[ex.id].weight !== "")
    .map(ex => ({ name:ex.name, weight:draft[ex.id].weight, sets:draft[ex.id].sets, reps:draft[ex.id].reps }));
  if(!exercises.length){ err = "Enter at least one weight before saving."; render(); return; }
  D.sessions = [...D.sessions.filter(s => !(s.date===trainDate && s.workout===trainWorkout)),
                { date:trainDate, workout:trainWorkout, exercises }]
                .sort((a,b)=>b.date.localeCompare(a.date));
  save(); justSaved = true; render();
}

function pickPlan(w){ planWhich = w; render(); }
function addPlan(){
  const name = document.getElementById("newName").value.trim();
  if(!name) return;
  const sets = document.getElementById("newSets").value || "3";
  const reps = document.getElementById("newReps").value || "10";
  D.plans[planWhich] = [...(D.plans[planWhich]||[]), { id:Date.now(), name, sets, reps }];
  save(); seedDraft(); render();
}
function editPlan(id,f,v){
  D.plans[planWhich] = D.plans[planWhich].map(ex => ex.id===id ? {...ex,[f]:v} : ex);
  save(); seedDraft();
}
function delPlan(id){
  D.plans[planWhich] = D.plans[planWhich].filter(ex => ex.id!==id);
  save(); seedDraft(); render();
}

function addWeight(){
  const date = document.getElementById("wDate").value;
  const val = parseFloat(document.getElementById("wVal").value);
  if(!date || isNaN(val)) return;
  D.weights = [...D.weights.filter(w=>w.date!==date), {date, value:val}].sort((a,b)=>b.date.localeCompare(a.date));
  save(); render();
}
function delWeight(date){ D.weights = D.weights.filter(w=>w.date!==date); save(); render(); }

async function addPhoto(e){
  const file = e.target.files[0];
  const date = document.getElementById("pDate").value || today();
  if(!file) return;
  try{
    const url = await compress(file);
    const id = String(Date.now());
    await IDB.put(id, url);
    D.photos = [{id,date}, ...D.photos].sort((a,b)=>b.date.localeCompare(a.date));
    save(); render();
  }catch(ex){ err = ex.message || "That photo didn't save."; render(); }
  e.target.value = "";
}
async function delPhoto(id){
  D.photos = D.photos.filter(p=>p.id!==id);
  save(); render();
  try{ await IDB.del(id); }catch(e){}
}
async function paintPhotos(){
  for(const p of D.photos){
    const el = document.getElementById("img-"+p.id);
    if(!el || el.src) continue;
    try{ const url = await IDB.get(p.id); if(url) el.src = url; }catch(e){}
  }
}

async function exportAll(){
  note = "";
  try{
    const photos = {};
    for(const p of D.photos){ const u = await IDB.get(p.id); if(u) photos[p.id] = u; }
    const blob = new Blob([JSON.stringify({app:"gymlog", version:1, exported:today(), data:D, photos})],
      {type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = `gym-backup-${today()}.json`;
    a.click();
    setTimeout(()=>URL.revokeObjectURL(a.href), 2000);
    D.lastBackup = today(); save();
    note = "Exported. In the share sheet choose Save to Files → iCloud Drive.";
  }catch(e){ err = "Export failed. Try again."; }
  render();
}

async function importAll(e){
  const file = e.target.files[0];
  if(!file) return;
  note = "";
  try{
    const parsed = JSON.parse(await file.text());
    if(!parsed.data || !parsed.data.plans) throw new Error("bad file");
    for(const [id,url] of Object.entries(parsed.photos || {})) await IDB.put(id,url);
    D = Object.assign(structuredClone(EMPTY), parsed.data);
    save(); seedDraft();
    note = "Restored from backup.";
  }catch(ex){ err = "That file isn't a gym backup, or it's damaged."; }
  e.target.value = "";
  render();
}

/* ============ render ============ */
function render(){
  const views = { train:viewTrain, plan:viewPlan, weight:viewWeight, photos:viewPhotos, backup:viewBackup };
  document.getElementById("app").innerHTML =
    (err ? `<div class="err">${esc(err)}</div>` : "") + views[tab]();
  document.getElementById("nav").innerHTML =
    [["train","Train"],["plan","Plan"],["weight","Weight"],["photos","Photos"],["backup","Backup"]]
    .map(([id,label]) => `<button class="${tab===id?"on":""}" onclick="go('${id}')">${label}</button>`).join("");
  if(tab === "photos") paintPhotos();
  TIMER.draw();
}
function go(t){ err=""; note=""; tab=t; if(t==="train") seedDraft(); render(); }

load();
seedDraft();
render();
</script>
</body>
</html>
